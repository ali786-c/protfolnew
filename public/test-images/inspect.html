<!DOCTYPE html>
<html>
<head>
    <title>Inspect Project Screenshots</title>
    <style>
        body { font-family: Arial, sans-serif; background: #121212; color: #fff; margin: 20px; }
        h1 { color: #A8FF53; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .card { background: #1e1e1e; border: 1px solid #333; border-radius: 8px; padding: 10px; text-align: center; }
        .card img { max-width: 100%; height: auto; border-radius: 4px; }
        .filename { margin-top: 10px; font-weight: bold; word-break: break-all; color: #ffca28; }
        .dimensions { font-size: 0.9em; color: #aaa; }
    </style>
</head>
<body>
    <h1>Inspect Project Screenshots</h1>
    <div class="grid">
        <div class="card">
            <img src="1.png" />
            <div class="filename">1.png</div>
        </div>
        <div class="card">
            <img src="2.png" />
            <div class="filename">2.png</div>
        </div>
        <div class="card">
            <img src="3.png" />
            <div class="filename">3.png</div>
        </div>
        <div class="card">
            <img src="playstore_screenshot_1_1780411037782.png" />
            <div class="filename">playstore_screenshot_1_1780411037782.png</div>
        </div>
        <div class="card">
            <img src="playstore_screenshot_2_1780411058429.png" />
            <div class="filename">playstore_screenshot_2_1780411058429.png</div>
        </div>
        <div class="card">
            <img src="playstore_screenshot_3_1780411095326.png" />
            <div class="filename">playstore_screenshot_3_1780411095326.png</div>
        </div>
        <div class="card">
            <img src="playstore_screenshot_9_16_2_1780411831631.png" />
            <div class="filename">playstore_screenshot_9_16_2_1780411831631.png</div>
        </div>
        <div class="card">
            <img src="playstore_screenshot_9_16_3_1780411849170.png" />
            <div class="filename">playstore_screenshot_9_16_3_1780411849170.png</div>
        </div>
    </div>
</body>
</html>
